<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎀 米妮的生日禮物</title>
<style>
:root{--pink:#e91e8c;--lpink:#ffd1e8;--bg:#fff8fc;--card:#fff;--navy:#2d1020;--muted:#9d7a8c;--border:#f0dae8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"PingFang TC","Noto Sans TC",Helvetica,sans-serif;background:var(--bg);color:var(--navy);min-height:100vh}

#pw-overlay{position:fixed;inset:0;background:linear-gradient(160deg,#2d1020,#5c1a3d);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#pw-overlay h2{font-size:22px;color:#fff}
#pw-overlay p{font-size:13px;color:rgba(255,255,255,.6)}
#pw-input{width:200px;padding:12px 16px;border:none;border-radius:12px;font-size:16px;text-align:center;background:rgba(255,255,255,.15);color:#fff;outline:none}
#pw-input::placeholder{color:rgba(255,255,255,.35)}
#pw-btn{padding:12px 32px;background:var(--pink);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
#pw-err{font-size:13px;color:#ffb3d4;min-height:18px}

.progress{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px}
.bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--pink),#ff6b9d);border-radius:3px;transition:width .4s}
.bar-label{font-size:12px;font-weight:700;color:var(--pink);white-space:nowrap}

.hero{padding:28px 20px 16px;text-align:center}
.hero-emoji{font-size:52px;margin-bottom:8px}
.hero-title{font-size:22px;font-weight:900;color:var(--navy)}
.hero-sub{font-size:13px;color:var(--muted);margin-top:6px}
.hero-date{display:inline-block;margin-top:10px;padding:4px 14px;background:var(--lpink);color:var(--pink);border-radius:20px;font-size:12px;font-weight:700}

.cards{padding:0 14px 120px;display:flex;flex-direction:column;gap:14px}
.card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(233,30,140,.08);border:1px solid var(--border)}
.card-head{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer}
.card-emoji-wrap{font-size:26px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:var(--lpink);border-radius:12px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-title{font-size:15px;font-weight:800;color:var(--navy)}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px}
.card-time{font-size:11px;color:var(--pink);font-weight:700;margin-top:4px}
.card-badge{font-size:13px;font-weight:900;color:var(--border)}
.card-badge.done{color:var(--pink)}
.card-body{padding:0 16px 16px;display:none}
.task-title{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:8px}
.ach{list-style:none;display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.ach li{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#5c3a4e;line-height:1.5}
.dot{width:6px;height:6px;border-radius:3px;background:var(--pink);flex-shrink:0;margin-top:6px}
.weather-note{background:#fff9f0;border:1px solid #ffd9a0;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#7a5a20;line-height:1.6}
.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.photo-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;cursor:pointer}
.upload-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;background:var(--lpink);color:var(--pink);border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:12px}
.done-btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--pink),#ff6b9d);color:#fff;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.5px}
.done-chip{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:#f0faf0;color:#3a7d44;border-radius:12px;font-size:14px;font-weight:800}
.locked-msg{padding:14px;text-align:center;font-size:13px;color:var(--muted)}

.spanel{position:fixed;inset:0;background:var(--bg);z-index:800;overflow-y:auto;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.spanel.open{transform:translateX(0)}
.s-nav{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:10}
.s-back{background:none;border:none;font-size:20px;cursor:pointer;color:var(--navy);padding:0}
.s-nav-title{font-size:16px;font-weight:800;color:var(--navy)}

.fab{position:fixed;bottom:22px;right:18px;width:52px;height:52px;border-radius:26px;background:linear-gradient(135deg,var(--pink),#ff6b9d);color:#fff;border:none;font-size:20px;cursor:pointer;z-index:500;box-shadow:0 4px 18px rgba(233,30,140,.4);display:flex;align-items:center;justify-content:center}
.fab-sum{position:fixed;bottom:86px;right:18px;width:52px;height:52px;border-radius:26px;background:linear-gradient(135deg,#ff6b9d,var(--pink));color:#fff;border:none;font-size:20px;cursor:pointer;z-index:500;box-shadow:0 4px 18px rgba(233,30,140,.4);display:flex;align-items:center;justify-content:center}

.adm-entry{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-size:11px;color:#d4bac8;cursor:pointer;z-index:100;padding:6px 12px}

.lbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9500;display:none;align-items:center;justify-content:center}
.lbox.open{display:flex}
.lbox img{max-width:92vw;max-height:92vh;border-radius:8px;object-fit:contain}
.lbox-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer}
</style>
</head>
<body>

<div id="pw-overlay">
  <div style="font-size:48px">🎀</div>
  <h2>米妮的生日禮物</h2>
  <p>請輸入通行密碼</p>
  <input id="pw-input" type="password" placeholder="密碼" onkeydown="if(event.key==='Enter')checkPw()">
  <button id="pw-btn" onclick="checkPw()">解鎖</button>
  <div id="pw-err"></div>
</div>
<script>
(function(){if(sessionStorage.getItem('mmb_auth')==='1')document.getElementById('pw-overlay').style.display='none';})();
function checkPw(){
  const v=document.getElementById('pw-input').value;
  if(v==='maomao'){sessionStorage.setItem('mmb_auth','1');document.getElementById('pw-overlay').style.display='none';}
  else{document.getElementById('pw-err').textContent='密碼錯誤，請再試一次';document.getElementById('pw-input').value='';}
}
</script>

<div class="progress">
  <div class="bar-wrap"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
  <div class="bar-label" id="bar-count">0 / 6</div>
</div>

<div class="hero">
  <div class="hero-emoji">🎀</div>
  <div class="hero-title">米妮的生日禮物</div>
  <div class="hero-sub">今天，為米妮找到最完美的那份心意</div>
  <div class="hero-date">📅 2026.06.07 · 高雄</div>
</div>

<div class="cards" id="cards"></div>

<div class="spanel" id="spanel">
  <div class="s-nav">
    <button class="s-back" onclick="closeSummary()">←</button>
    <div class="s-nav-title">🎀 任務完成！</div>
  </div>
  <div id="s-content"></div>
</div>

<div class="adm-entry" onclick="openAdmLogin()">⚙️ 管理後台</div>
<div id="adm-panel-wrap"></div>

<button class="fab-sum" id="fab-sum" onclick="openSummary()">🏅</button>
<button class="fab" onclick="openSummary()">📷</button>

<div class="lbox" id="lbox" onclick="closeLbox()">
  <img id="lbox-img" src="" alt="">
  <button class="lbox-close" onclick="closeLbox()">×</button>
</div>

<script>
const TOTAL=6;
const TASKS=[
  {id:1,emoji:'🚇',title:'鳳山站，出發！',sub:'任務從鳳山捷運站正式啟動',time:'13:00',
   taskTitle:'抵達鳳山捷運站',items:['找到鳳山捷運站入口','感應悠遊卡，準備進站','站在月台前拍下出發紀念照']},
  {id:2,emoji:'🌈',title:'美麗島站 · 光之穹頂',sub:'全球最美捷運站之一，就在高雄',time:'13:30',
   taskTitle:'在光之穹頂下打卡',items:['下車，找到光之穹頂','在彩色玻璃穹頂下仰拍','和穹頂合拍一張紀念照']},
  {id:3,emoji:'🏬',title:'前進漢神巨蛋',sub:'從美麗島站步行前往',time:'13:45',
   taskTitle:'抵達漢神巨蛋',items:['找到漢神巨蛋的方向','拍下漢神巨蛋外觀或招牌','順利入場！']},
  {id:4,emoji:'🎀',title:'米妮禮物大作戰',sub:'今天最重要的任務，正式開始',time:'14:00',
   taskTitle:'尋找米妮相關商品',items:['逛遍各樓層尋找米妮商品','至少比較3個候選禮物','拍下最心動的那個']},
  {id:5,emoji:'🛍️',title:'做出決定！',sub:'就是你了，最完美的那份',time:'14:30',
   taskTitle:'選定禮物並結帳',items:['選定最完美的那份禮物','前往收銀台結帳','拍下購物袋或禮物盒']},
  {id:6,emoji:'🎂',title:'生日快樂，米妮！',sub:'今天的任務圓滿完成',time:'15:00',
   taskTitle:'記錄這個美好時刻',items:['和禮物拍一張合照','記錄下今天的心情','期待米妮看到禮物時的笑臉 🥳']}
];

function gs(){try{return JSON.parse(localStorage.getItem('mmb26'))||{c:[]}}catch{return{c:[]}}}
function ss(s){localStorage.setItem('mmb26',JSON.stringify(s))}
function getPhotos(id){try{return JSON.parse(localStorage.getItem('mmb26_p'+id))||[]}catch{return[]}}
function savePhotos(id,arr){try{localStorage.setItem('mmb26_p'+id,JSON.stringify(arr));return true}catch{alert('儲存空間不足');return false}}
function getAdm(){try{return JSON.parse(localStorage.getItem('mmb26_adm'))||{}}catch{return{}}}
function saveAdm(d){localStorage.setItem('mmb26_adm',JSON.stringify(d))}
function getClaudeKey(){return localStorage.getItem('fjt26_akey')||''}

async function compress(file){
  return new Promise(r=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=900;let w=img.naturalWidth,h=img.naturalHeight;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX}else{w=Math.round(w*MAX/h);h=MAX}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);r(c.toDataURL('image/jpeg',.72));
    };img.src=url;
  });
}
async function handleUpload(e,id){
  const files=[...e.target.files];
  for(const f of files){const d=await compress(f);const p=getPhotos(id);p.push(d);if(!savePhotos(id,p))break;}
  e.target.value='';renderPhotos(id);
}
function delPhoto(id,i){const p=getPhotos(id);p.splice(i,1);savePhotos(id,p);renderPhotos(id);}
function renderPhotos(id){
  const g=document.getElementById('pg-'+id);if(!g)return;
  const p=getPhotos(id);
  g.innerHTML=p.map((u,i)=>`<div style="position:relative;display:inline-block">
    <img class="photo-thumb" src="${u}" onclick="openLbox('${u}')">
    <button onclick="delPhoto(${id},${i})" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;line-height:1">✕</button>
  </div>`).join('');
}

function buildCards(){
  const adm=getAdm();const cmpl=gs().c;const cont=document.getElementById('cards');
  let html='';
  TASKS.forEach((t,idx)=>{
    const done=cmpl.includes(t.id);
    const prevDone=idx===0||cmpl.includes(TASKS[idx-1].id);
    const locked=!done&&!prevDone;
    const a=adm[t.id]||{};
    const title=a.title||t.title;
    const sub=a.sub!==undefined?a.sub:t.sub;
    const time=a.time||t.time;
    const taskTitle=a.taskTitle!==undefined?a.taskTitle:t.taskTitle;
    const items=(a.taskItems!==undefined?a.taskItems:t.items.join('\n')).split('\n').filter(s=>s.trim());
    const note=a.note||'';
    html+=`<div class="card" id="c${t.id}">
      <div class="card-head" onclick="toggleCard(${t.id})">
        <div class="card-emoji-wrap">${t.emoji}</div>
        <div class="card-info">
          <div class="card-title">${title}</div>
          <div class="card-sub">${sub}</div>
          <div class="card-time">${time}</div>
        </div>
        <div class="card-badge${done?' done':''}">${done?'✓':String(t.id).padStart(2,'0')}</div>
      </div>
      <div class="card-body" id="cb${t.id}">`;
    if(locked){
      html+=`<div class="locked-msg">🔒 請先完成前一個任務</div>`;
    }else{
      if(note)html+=`<div class="weather-note">⚠️ ${note}</div>`;
      html+=`<div class="task-title">${taskTitle}</div>
        <ul class="ach">${items.map(s=>`<li><span class="dot"></span><span>${s}</span></li>`).join('')}</ul>
        <div class="photo-grid" id="pg-${t.id}"></div>
        <label style="cursor:pointer">
          <input type="file" accept="image/*" multiple style="display:none" onchange="handleUpload(event,${t.id})">
          <div class="upload-btn">📷 上傳照片</div>
        </label>`;
      html+=done?`<div class="done-chip">✅ 任務完成！</div>`:`<button class="done-btn" onclick="doneTask(${t.id})">完成此關卡 ✓</button>`;
    }
    html+=`</div></div>`;
  });
  cont.innerHTML=html;
  TASKS.forEach(t=>renderPhotos(t.id));
  updateBar();
}

function toggleCard(id){
  const cb=document.getElementById('cb'+id);if(!cb)return;
  const open=cb.style.display==='block';
  document.querySelectorAll('.card-body').forEach(b=>b.style.display='none');
  if(!open)cb.style.display='block';
}

function doneTask(id){
  if(getPhotos(id).length===0){alert('📷 請先上傳至少一張照片，才能完成任務！');return;}
  const s=gs();if(!s.c.includes(id)){s.c.push(id);ss(s);}
  buildCards();
  if(s.c.length===TOTAL){
    document.getElementById('fab-sum').style.display='flex';
    launchConfetti();setTimeout(openSummary,1800);
  }
}

function updateBar(){
  const n=gs().c.length;
  document.getElementById('bar-fill').style.width=(n/TOTAL*100)+'%';
  document.getElementById('bar-count').textContent=n+' / '+TOTAL;
}

function openSummary(){
  const content=document.getElementById('s-content');
  const cmpl=gs().c;let totalPhotos=0;TASKS.forEach(t=>totalPhotos+=getPhotos(t.id).length);
  let html=`<div style="text-align:center;padding:28px 20px 16px">
    <div style="font-size:52px">🎀</div>
    <h1 style="font-size:20px;font-weight:900;color:var(--navy);margin:10px 0 6px">米妮的生日禮物</h1>
    <div style="font-size:13px;color:var(--muted)">2026.06.07 · 高雄</div>
    <div style="display:flex;justify-content:center;gap:24px;margin-top:16px">
      <div style="text-align:center"><div style="font-size:26px;font-weight:900;color:var(--pink)">${cmpl.length}</div><div style="font-size:11px;color:var(--muted)">關完成</div></div>
      <div style="text-align:center"><div style="font-size:26px;font-weight:900;color:var(--pink)">${totalPhotos}</div><div style="font-size:11px;color:var(--muted)">張照片</div></div>
    </div>
  </div><div style="padding:0 14px">`;
  TASKS.forEach(t=>{
    const photos=getPhotos(t.id);const done=cmpl.includes(t.id);
    html+=`<div style="background:#fff;border-radius:14px;margin-bottom:14px;overflow:hidden;border:1px solid var(--border)">`;
    if(photos.length>0){
      const pos=getPhotoPos(t.id);
      html+=`<div style="position:relative;">
        <img src="${photos[0]}" data-pos-id="${t.id}" style="width:100%;height:200px;object-fit:cover;display:block;object-position:${pos.x}% ${pos.y}%;cursor:pointer" onclick="openLbox('${photos[0]}')">
        <div style="position:absolute;top:9px;right:10px;background:rgba(0,0,0,.38);border-radius:20px;padding:3px 9px;font-size:11px;color:#fff;backdrop-filter:blur(4px)">${t.time}</div>
        ${done?'<div style="position:absolute;bottom:9px;right:10px;background:#e91e8c;border-radius:20px;padding:2px 9px;font-size:11px;color:#fff;font-weight:700">✅ 完成</div>':''}
        <button onclick="openPosEditor(${t.id})" style="position:absolute;bottom:9px;left:10px;background:rgba(0,0,0,.42);border:none;color:#fff;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;backdrop-filter:blur(4px)">✏️ 調整位置</button>
      </div>`;
    }
    html+=`<div style="padding:12px 14px">
      <div style="display:flex;align-items:center;gap:9px">
        <div style="font-size:19px;width:36px;height:36px;background:var(--lpink);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${t.emoji}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:800;color:var(--navy)">${t.title}</div>
        </div>
        ${photos.length===0?`<div style="font-size:18px">${done?'✅':'⬜'}</div>`:''}
      </div>
      <div id="s-desc-${t.id}" style="font-size:12px;color:#9d6a7a;margin-top:8px;line-height:1.8;font-style:italic;padding-left:2px">${t.sub}</div>`;
    if(photos.length>1){
      html+=`<div style="display:flex;gap:6px;overflow-x:auto;margin-top:10px;padding-bottom:2px">
        ${photos.slice(1).map(u=>`<img src="${u}" style="width:66px;height:66px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:pointer" onclick="openLbox('${u}')">`).join('')}
      </div>`;
    }
    html+=`</div></div>`;
  });
  html+=`<div style="text-align:center;padding:28px 0 16px">
    <div style="font-size:40px">🎂</div>
    <h2 style="font-size:18px;font-weight:800;color:var(--navy);margin:10px 0 8px">生日快樂，米妮！</h2>
    <p style="font-size:13px;color:var(--muted);line-height:2">今天的每一個腳步<br>都是為了讓米妮的生日更特別</p>
    <div style="margin-top:14px;font-size:12px;color:#d4bac8;font-weight:700">🎀 米妮生日快樂 2026</div>
    <button id="ai-diary-btn" onclick="genAiDiary()" style="margin-top:20px;padding:12px 28px;border-radius:24px;border:none;background:linear-gradient(135deg,#f093fb,#e91e8c);color:#fff;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 15px rgba(233,30,140,.3)">✨ AI 生成今日日記</button>
    <div id="ai-diary-out" style="display:none;width:100%;max-width:480px;margin:8px auto 0"></div>
    <button onclick="exportPDF()" style="display:block;margin:20px auto 0;padding:10px 28px;border-radius:4px;border:1px solid #d4bac8;background:none;color:#9d7a8c;font-size:13px;letter-spacing:.08em;cursor:pointer">PDF 匯出</button>
  </div></div>`;
  content.innerHTML=html;
  document.getElementById('spanel').scrollTop=0;
  document.getElementById('spanel').classList.add('open');
}
function closeSummary(){document.getElementById('spanel').classList.remove('open');}

function openLbox(url){document.getElementById('lbox-img').src=url;document.getElementById('lbox').classList.add('open');}
function closeLbox(){document.getElementById('lbox').classList.remove('open');}

function getPhotoPos(id){const p=localStorage.getItem('mmb26_ppos_'+id);return p?JSON.parse(p):{x:50,y:50};}
function setPhotoPos(id,x,y){localStorage.setItem('mmb26_ppos_'+id,JSON.stringify({x,y}));}

function openPosEditor(id){
  const photos=getPhotos(id);if(!photos.length)return;
  const pos=getPhotoPos(id);
  const ov=document.createElement('div');ov.id='pos-ov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9700;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px';
  ov.innerHTML=`<div style="width:100%;max-width:380px">
    <div style="text-align:center;color:#fff;font-size:14px;font-weight:700;margin-bottom:12px">拖曳設定照片焦點</div>
    <div style="text-align:center;color:rgba(255,255,255,.5);font-size:11px;margin-bottom:10px">點一下或拖曳白圈到想保留的重點位置</div>
    <div id="pos-wrap" style="position:relative;width:100%;height:240px;border-radius:12px;overflow:hidden;cursor:crosshair;touch-action:none;user-select:none">

  document.body.appendChild(ov);
  window._posEdit={x:pos.x,y:pos.y};

  const img=document.getElementById('pos-img');
  const cross=document.getElementById('pos-cross');
  function upd(cx,cy){
    const r=wrap.getBoundingClientRect();
    const x=Math.max(0,Math.min(100,((cx-r.left)/r.width)*100));
    const y=Math.max(0,Math.min(100,((cy-r.top)/r.height)*100));
    window._posEdit={x,y};img.style.objectPosition=x+'% '+y+'%';
    cross.style.left=x+'%';cross.style.top=y+'%';
  }
  wrap.addEventListener('mousedown',e=>{e.preventDefault();upd(e.clientX,e.clientY);});
  wrap.addEventListener('mousemove',e=>{if(e.buttons)upd(e.clientX,e.clientY);});
  wrap.addEventListener('touchstart',e=>{e.preventDefault();upd(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  wrap.addEventListener('touchmove',e=>{e.preventDefault();upd(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
}

function launchConfetti(){
  const cv=document.createElement('canvas');cv.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9000';document.body.appendChild(cv);
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  const p=Array.from({length:120},()=>({x:Math.random()*cv.width,y:-10,vx:(Math.random()-.5)*4,vy:Math.random()*3+2,r:Math.random()*5+3,c:['#e91e8c','#ffd1e8','#ff6b9d','#fff','#ff9ac1'][Math.floor(Math.random()*5)]}));
  let f=0;(function anim(){if(f++>200){cv.remove();return;}requestAnimationFrame(anim);ctx.clearRect(0,0,cv.width,cv.height);p.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=.06;ctx.fillStyle=pt.c;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,6.28);ctx.fill();});})();
}

async function callClaudeRaw(arr,max){
  max=max||1500;const key=getClaudeKey();
  if(!key){alert('請先在後台設定 Claude API Key');throw new Error('no key');}
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','content-type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5',max_tokens:max,messages:[{role:'user',content:arr}]})
  });
  if(!r.ok)throw new Error('API '+r.status);
  return(await r.json()).content[0].text;
}

      <input id="adm-api-key" type="password" placeholder="sk-ant-api03-..." value="${savedKey}" style="width:100%;padding:10px;border:1.5px solid #c7d2fe;border-radius:8px;font-size:13px;font-family:monospace;box-sizing:border-box;margin-bottom:8px">
      <button onclick="(function(){const v=document.getElementById('adm-api-key').value.trim();localStorage.setItem('fjt26_akey',v);alert(v?'✅ API Key 已儲存':'已清除 API Key');})()" style="width:100%;padding:10px;border-radius:8px;border:none;background:#4f46e5;color:#fff;font-size:13px;font-weight:700;cursor:pointer">儲存 API Key</button>
    </div>
    ${cards}
    <div style="padding:16px;background:#fff;border-radius:12px;text-align:center;margin-top:4px">
      <div style="font-size:12px;color:#999;margin-bottom:10px">危險操作區</div>
      <button onclick="resetAllProgress()" style="padding:10px 24px;border-radius:10px;border:1.5px solid #e8715a;background:none;color:#e8715a;font-size:14px;font-weight:700;cursor:pointer">🗑️ 重置所有進度</button>
    </div>
  </div>`;
  document.body.appendChild(panel);
}

buildCards();
</script>
